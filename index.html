                fillPos[i * 6 + 5] = 0;

                fillCol[i * 6] = settings.color1.r;
                fillCol[i * 6 + 1] = settings.color1.g;
                fillCol[i * 6 + 2] = settings.color1.b;
                fillCol[i * 6 + 3] = 0;
                fillCol[i * 6 + 4] = 0;
                fillCol[i * 6 + 5] = 0;
            }

            fill.geometry.attributes.position.needsUpdate = true;
            fill.geometry.attributes.color.needsUpdate = true;
            line.geometry.attributes.position.needsUpdate = true;

            line.material.color.copy(settings.color1);
            group.children[1].material.color.copy(settings.color2);
        }

        // --- Lógica de Audio ---
        async function setupAudio() {
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    analyser = audioContext.createAnalyser();
                    analyser.fftSize = 1024;
                    analyser.smoothingTimeConstant = 0.85;
                    source = audioContext.createMediaStreamSource(stream);
                    source.connect(analyser);
                    dataArray = new Uint8Array(analyser.frequencyBinCount);
                    timeDataArray = new Uint8Array(analyser.fftSize);
                    isAudioActive = true;

                    const btn = document.getElementById('audioButton');
                    btn.textContent = 'Audio Linked';
                    btn.style.background = 'linear-gradient(135deg, #10b981 0%, #059669 100%)';
                    btn.disabled = true;
                    document.getElementById('sensitivity').disabled = false;
                    document.getElementById('audioStatus').textContent = "Listening to environment";
                } catch (err) {
                    document.getElementById('audioStatus').textContent = "Permission denied";
                }
            } else {
                document.getElementById('audioStatus').textContent = "Audio not supported";
            }
        }

        // --- Listeners y UI ---
        function setupUIListeners() {
            const ui = {
                pattern: document.getElementById('pattern'),
                speed: document.getElementById('speed'),
                color1: document.getElementById('color1'),
                color2: document.getElementById('color2'),
                audioButton: document.getElementById('audioButton'),
                sensitivity: document.getElementById('sensitivity'),
                bloomIntensity: document.getElementById('bloomIntensity'),
                toggleButton: document.getElementById('toggleButton'),
                fullscreenButton: document.getElementById('fullscreenButton'),
                resetCamButton: document.getElementById('resetCamButton'),
                controlsPanel: document.getElementById('controls'),
                savePresetBtn: document.getElementById('savePresetBtn'),
                clearPresetsBtn: document.getElementById('clearPresetsBtn'),
            };

            let colorDebounce;
            const handleColorUpdate = () => {
                settings.color1.set(ui.color1.value);
                settings.color2.set(ui.color2.value);
                updateBackgroundColors();

                if (settings.pattern === 'equalizer' && objects[0]) {
                    // Actualización inmediata (súper fluida sin recrear geometría)
                    const segmentsPerBar = objects[0].userData.bars[0].userData.segments.length;
                    objects[0].userData.bars.forEach(barGroup => {
                        barGroup.userData.segments.forEach((segment, j) => {
                            segment.material.color.lerpColors(settings.color2, settings.color1, j / segmentsPerBar);
                        });
                    });
                } else if (settings.pattern === 'oscilloscope') {
                    // El osciloscopio se actualiza en tiempo real internamente en animate()
                } else {
                    // Retrasar la reconstrucción pesada mientras se arrastra el color picker
                    clearTimeout(colorDebounce);
                    colorDebounce = setTimeout(() => {
                        createPattern();
                    }, 80);
                }
            };

            ui.pattern.addEventListener('change', e => {
                settings.pattern = e.target.value;
                updateSpecificUIPanel();
                createPattern();
            });
            ui.speed.addEventListener('input', e => { settings.speed = parseFloat(e.target.value); });

            ui.bloomIntensity.addEventListener('input', e => {
                if (bloomPass) bloomPass.strength = parseFloat(e.target.value);
            });

            ui.color1.addEventListener('input', handleColorUpdate);
            ui.color2.addEventListener('input', handleColorUpdate);

            ui.audioButton.addEventListener('click', setupAudio);
            ui.sensitivity.addEventListener('input', e => { settings.sensitivity = parseFloat(e.target.value); });

            ui.savePresetBtn.addEventListener('click', () => {
                const c1 = ui.color1.value;
                const c2 = ui.color2.value;
                userPresets.push({ name: 'Custom ' + (userPresets.length + 1), c1, c2 });
                localStorage.setItem('visualizer_presets', JSON.stringify(userPresets));
                buildPresets();
            });

            ui.clearPresetsBtn.addEventListener('click', () => {
                userPresets = [];
                localStorage.removeItem('visualizer_presets');
                buildPresets();
            });

            ui.resetCamButton.addEventListener('click', resetCameraView);

            document.querySelectorAll('.spec-slider').forEach(slider => {
                slider.addEventListener('input', (e) => {
                    const pattern = e.target.dataset.pattern;
                    const key = e.target.dataset.key;
                    specSettings[pattern][key] = parseFloat(e.target.value);

                    if (e.target.dataset.rebuild === 'true') {
                        createPattern();
                    }
                });
            });

            let isPanelVisible = true; // Empieza abierto
            ui.controlsPanel.classList.remove('hidden');

            ui.toggleButton.addEventListener('click', () => {
                isPanelVisible = !isPanelVisible;
                if (isPanelVisible) {
                    ui.controlsPanel.classList.remove('hidden');
                    if (!isMobile) {
                        ui.toggleButton.style.transform = "translateX(360px)";
                        ui.fullscreenButton.style.transform = "translateX(360px)";
                        ui.resetCamButton.style.transform = "translateX(360px)";
                    }
                } else {
                    ui.controlsPanel.classList.add('hidden');
                    if (!isMobile) {
                        ui.toggleButton.style.transform = "translateX(0px)";
                        ui.fullscreenButton.style.transform = "translateX(0px)";
                        ui.resetCamButton.style.transform = "translateX(0px)";
                    }
                }
            });

            ui.fullscreenButton.addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => {
                        console.error(`Error: ${err.message}`);
                    });
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                    }
                }
            });
        }

        window.addEventListener('resize', () => {
            const aspect = window.innerWidth / window.innerHeight;
            perspectiveCamera.aspect = aspect;
            perspectiveCamera.updateProjectionMatrix();

            orthoCamera.left = window.innerWidth / -2;
            orthoCamera.right = window.innerWidth / 2;
            orthoCamera.top = window.innerHeight / 2;
            orthoCamera.bottom = window.innerHeight / -2;
            orthoCamera.updateProjectionMatrix();

            renderer.setSize(window.innerWidth, window.innerHeight);
            if (composer) composer.setSize(window.innerWidth, window.innerHeight);

            if (settings.pattern === 'equalizer' || settings.pattern === 'oscilloscope') {
                createPattern();
            }
        });

        // --- Tutorial Implementation ---
        const tutorialSteps = [
            {
                title: "Welcome to Music Visualizer!",
                content: "Discover 11 high-performance sensory experiences that react in real-time to your music or environment.",
                target: null // Screen center
            },
            {
                title: "Control Panel",
                content: "Open this panel to customize every aspect of the visual experience.",
                target: "#toggleButton"
            },
            {
                title: "Environment Audio",
                content: "Click here to link your microphone. The visuals will react instantly to the sound around you.",
                target: "#audioButton",
                action: () => {
                    const panel = document.getElementById('controls');
                    if (panel.classList.contains('hidden')) {
                        document.getElementById('toggleButton').click();
                    }
                }
            },
            {
                title: "Visual Experiences",
                content: "Switch between 11 unique modes like DNA Helix, Infinite Tunnel, or Neural Network.",
                target: "#pattern"
            },
            {
                title: "Dynamic Colors",
                content: "Customize the color palette or pick one of our premium presets.",
                target: "#presetContainer"
            },
            {
                title: "Camera Interaction",
                content: "Click and drag to rotate in 3D, and scroll to zoom. Use this button to reset the view.",
                target: "#resetCamButton"
            },
            {
                title: "Total Immersion",
                content: "Go full screen to transform your room into a digital sanctuary.",
                target: "#fullscreenButton"
            }
        ];

        let currentStep = 0;
        const tutorialOverlay = document.getElementById('tutorial-overlay');
        const tutorialTooltip = document.getElementById('tutorial-tooltip');

        function startTutorial() {
            if (localStorage.getItem('visualizer_tutorial_done')) return;

            currentStep = 0;
            tutorialOverlay.classList.add('active');
            tutorialTooltip.classList.add('active');
            showStep(currentStep);
        }

        function showStep(index) {
            const step = tutorialSteps[index];
            document.getElementById('tutorial-title').textContent = step.title;
            document.getElementById('tutorial-content').textContent = step.content;

            document.getElementById('tutorial-prev').style.display = index === 0 ? 'none' : 'block';
            document.getElementById('tutorial-next').textContent = index === tutorialSteps.length - 1 ? 'Finish' : 'Next';

            if (step.action) step.action();

            if (step.target) {
                const targetEl = document.querySelector(step.target);
                if (targetEl) {
                    const rect = targetEl.getBoundingClientRect();
                    const centerX = rect.left + rect.width / 2;
                    const centerY = rect.top + rect.height / 2;
                    const radius = Math.max(rect.width, rect.height) / 2 + 10;

                    tutorialOverlay.style.setProperty('--x', `${centerX}px`);
                    tutorialOverlay.style.setProperty('--y', `${centerY}px`);
                    tutorialOverlay.style.setProperty('--r', `${radius}px`);

                    // Position tooltip near target
                    const tooltipRect = tutorialTooltip.getBoundingClientRect();
                    let top = rect.bottom + 20;
                    let left = centerX - tooltipRect.width / 2;

                    // Boundary checks
                    if (isMobile) {
                        top = rect.bottom + 10;
                        if (top + tooltipRect.height > window.innerHeight) top = rect.top - tooltipRect.height - 10;
                    } else {
                        if (top + tooltipRect.height > window.innerHeight) top = rect.top - tooltipRect.height - 20;
                        if (left < 20) left = 20;
                        if (left + tooltipRect.width > window.innerWidth - 20) left = window.innerWidth - tooltipRect.width - 20;
                    }

                    tutorialTooltip.style.top = `${top}px`;
                    tutorialTooltip.style.left = isMobile ? '20px' : `${left}px`;
                    tutorialTooltip.style.setProperty('--tx', '0%');
                    tutorialTooltip.style.setProperty('--ty', '0%');
                }
            } else {
                // Center welcome step
                tutorialOverlay.style.setProperty('--r', `0px`);
                tutorialTooltip.style.top = '50%';
                tutorialTooltip.style.left = isMobile ? '20px' : '50%';
                tutorialTooltip.style.setProperty('--tx', isMobile ? '0%' : '-50%');
                tutorialTooltip.style.setProperty('--ty', '-50%');
            }
        }

        document.getElementById('tutorial-next').onclick = () => {
            currentStep++;
            if (currentStep < tutorialSteps.length) {
                showStep(currentStep);
            } else {
                finishTutorial();
            }
        };

        document.getElementById('tutorial-prev').onclick = () => {
            currentStep--;
            if (currentStep >= 0) {
                showStep(currentStep);
            }
        };

        document.getElementById('tutorial-skip').onclick = finishTutorial;

        function finishTutorial() {
            tutorialOverlay.classList.remove('active');
            tutorialTooltip.classList.remove('active');
            localStorage.setItem('visualizer_tutorial_done', 'true');

            // Close panel if it was opened by tutorial
            const panel = document.getElementById('controls');
            if (!panel.classList.contains('hidden')) {
                // document.getElementById('toggleButton').click(); // Let the user keep it open if they want
            }
        }

        // Handle resize during tutorial
        window.addEventListener('resize', () => {
            if (tutorialOverlay.classList.contains('active')) {
                showStep(currentStep);
            }
        });

        // Initialize
        init();
        setTimeout(startTutorial, 1000); // Small delay for effect
    </script>
</body>

</html>
